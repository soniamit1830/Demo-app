version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - echo Build started on `date`
      - echo Installing dependencies...
  build:
    commands:
      - echo Building the Spring Boot application...
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - target/*.jar
  discard-paths: yes